feeds:
  - id: tor_exit
    enabled: true
    url: "https://check.torproject.org/exit-addresses"
    parser: "tor_exit"
    output_file: "tor_exit.txt"

  - id: spamhaus_drop
    enabled: true
    url: "https://www.spamhaus.org/drop/drop.txt"
    parser: "spamhaus_drop"
    output_file: "spamhaus_drop.txt"

  - id: firehol_level1
    enabled: true
    url: "https://raw.githubusercontent.com/firehol/blocklist-ipsets/master/firehol_level1.netset"
    parser: "firehol_level1"
    output_file: "firehol_level1.txt"

  - id: emerging_compromised
    enabled: true
    url: "https://rules.emergingthreats.net/blockrules/compromised-ips.txt"
    parser: "plain_text"
    output_file: "emerging_compromised.txt"
