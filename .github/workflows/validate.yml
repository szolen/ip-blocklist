name: Build IP lists

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run generator
        run: |
          python -m src.main

      - name: Debug outputs
        run: |
          echo "PWD=$(pwd)"
          echo "--- repo root ---"
          ls -la
          echo "--- output tree ---"
          find output -maxdepth 3 -type f | sort || true
          echo "--- manifest ---"
          cat output/manifest.json || true

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: rebuild IP feeds"
          git push